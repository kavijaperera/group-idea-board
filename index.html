<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Idea Board</title>
    <style>
        :root {
            --primary-blue: #4a69bd;
            --hover-blue: #3c55a5;
            --bg-gray: #f4f7f6;
            --border-color: #dcdde1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* Header */
        .header {
            background-color: var(--primary-blue);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: 500;
        }

        /* Input Area */
        .input-section {
            padding: 20px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
            background: #fff;
        }

        select, input {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
        }

        select { width: 30%; color: #555; }
        input { flex-grow: 1; }

        button {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--hover-blue);
        }

        /* List Area */
        .idea-list {
            padding: 20px;
            min-height: 200px;
            list-style: none;
            margin: 0;
        }

        .idea-item {
            margin-bottom: 15px;
            font-size: 16px;
            display: flex;
            align-items: center;
        }

        .idea-item::before {
            content: "•";
            margin-right: 10px;
            font-weight: bold;
        }

        .suggested-by {
            font-style: italic;
            color: #666;
            margin-left: 5px;
        }

        .name-bold {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">Group Idea Board</div>
    
    <div class="input-section">
        <select id="nameSelect">
            <option value="" disabled selected>Select your name...</option>
            <option value="Nimal">Nimal</option>
            <option value="Sara">Sara</option>
            <option value="Alex">Alex</option>
            <option value="Guest">Guest</option>
        </select>
        
        <input type="text" id="ideaInput" placeholder="Enter your idea here...">
        
        <button onclick="addIdea()">Add Idea</button>
    </div>

    <ul class="idea-list" id="ideaList">
        <li class="idea-item">Build a study planner – <span class="suggested-by">suggested by <span class="name-bold">Nimal</span></span></li>
        <li class="idea-item">Start a podcast – <span class="suggested-by">suggested by <span class="name-bold">Sara</span></span></li>
        <li class="idea-item">Organize a coding workshop – <span class="suggested-by">suggested by <span class="name-bold">Alex</span></span></li>
    </ul>
</div>

<script>
    function addIdea() {
        const nameSelect = document.getElementById('nameSelect');
        const ideaInput = document.getElementById('ideaInput');
        const ideaList = document.getElementById('ideaList');

        const name = nameSelect.value;
        const idea = ideaInput.value.trim();

        // Validation
        if (!name) {
            alert("Please select a name!");
            return;
        }
        if (!idea) {
            alert("Please enter an idea!");
            return;
        }

        // Create new list item
        const li = document.createElement('li');
        li.className = 'idea-item';
        li.innerHTML = `${idea} – <span class="suggested-by">suggested by <span class="name-bold">${name}</span></span>`;

        // Add to list
        ideaList.appendChild(li);

        // Clear input field
        ideaInput.value = '';
    }
</script>

</body>
</html>
