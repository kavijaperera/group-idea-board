<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCSC Student Toolkit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-maroon: #800000;
            --accent-gold: #FFD700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --bg-gray: #F5F7FA;
            --card-white: #FFFFFF;
            --text-main: #333333;
            --text-muted: #7f8c8d;
            --border: #dfe6e9;
            --nav-hover: rgba(255, 255, 255, 0.1);
        }

        body.dark-mode {
            --bg-gray: #121212;
            --card-white: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #b0b0b0;
            --border: #333333;
            --gold-glow: rgba(255, 215, 0, 0.15);
            --nav-hover: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        
        body { background-color: var(--bg-gray); color: var(--text-main); min-height: 100vh; }

        /* --- NAVIGATION --- */
        .top-nav {
            background-color: var(--primary-maroon);
            color: white;
            padding: 8px 0;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .nav-container {
            max-width: 1200px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
        }

        .brand-box { display: flex; align-items: center; gap: 12px; }
        .ucsc-logo { height: 45px; width: auto; object-fit: contain; }
        .brand-text { font-weight: 800; font-size: 1.3rem; letter-spacing: -0.5px; }
        .brand-text span { color: var(--accent-gold); }

        .nav-right { display: flex; align-items: center; gap: 15px; }
        .nav-buttons { display: flex; gap: 8px; }

        .nav-btn {
            background: transparent; border: none; color: white;
            padding: 10px 15px; border-radius: 10px; font-weight: 600; cursor: pointer;
        }

        .nav-btn:hover { background: var(--nav-hover); transform: translateY(-2px); border-bottom: 3px solid var(--accent-gold); }
        .nav-btn.active { background: var(--accent-gold); color: var(--primary-maroon); box-shadow: 0 0 15px var(--gold-glow); }

        /* --- LAYOUT --- */
        .main-layout {
            display: grid; grid-template-columns: 280px 1fr;
            max-width: 1200px; margin: 30px auto; gap: 25px; padding: 0 20px;
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
            .nav-container { flex-direction: column; padding: 15px; }
        }

        .sidebar { background: var(--card-white); padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); height: fit-content; }
        
        .hover-card {
            padding: 15px; margin-bottom: 12px; background: var(--card-white);
            border-left: 4px solid var(--primary-maroon); border-radius: 8px; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            word-wrap: break-word;
            display: flex; justify-content: space-between; align-items: flex-start;
        }

        .hover-card:hover { transform: scale(1.04); box-shadow: 0 0 18px var(--gold-glow); border-left-color: var(--accent-gold); }

        .btn-delete {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; padding: 5px; transition: all 0.3s ease;
        }

        .btn-delete:hover { color: #e74c3c; transform: scale(1.3); filter: drop-shadow(0 0 5px var(--gold-glow)); }

        .card-container { background: var(--card-white); border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .tool-section { display: none; }
        .tool-section.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .big-display { font-size: 5.5rem; font-weight: 800; color: var(--primary-maroon); margin: 20px 0; }
        body.dark-mode .big-display { color: var(--accent-gold); }

        .btn-action { 
            padding: 12px 25px; border: none; border-radius: 10px; 
            font-weight: 700; cursor: pointer; color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-action:hover { transform: scale(1.08); box-shadow: 0 5px 15px var(--gold-glow); }
        .btn-maroon { background: var(--primary-maroon); }
        .btn-green { background: #27ae60; }
        .btn-red { background: #e74c3c; }

        input { padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--card-white); color: var(--text-main); }

        .theme-switch { position: relative; display: inline-block; width: 44px; height: 22px; margin-left: 10px; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.2); border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; }
        input:checked + .slider { background: var(--accent-gold); }
        input:checked + .slider:before { transform: translateX(22px); background: var(--primary-maroon); }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-container">
            <div class="brand-box">
                <img src="ucsc-logo.png" alt="UCSC Logo" class="ucsc-logo">
                <div class="brand-text">UCSC <span>Hub</span></div>
            </div>
            <div class="nav-right">
                <div class="nav-buttons">
                    <button class="nav-btn active" onclick="showSection('timer', this)">Study Timer</button>
                    <button class="nav-btn" onclick="showSection('gpa', this)">GPA Calc</button>
                    <button class="nav-btn" onclick="showSection('board', this)">Idea Board</button>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <label class="theme-switch"><input type="checkbox" id="darkModeToggle"><span class="slider"></span></label>
                    <i id="themeIcon" class="fa-solid fa-sun" style="color: white; font-size: 0.9rem;"></i>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-layout">
        <aside class="sidebar">
            <h4 style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase;">Upcoming Events</h4>
            <div class="hover-card"><div><strong>Mar 15</strong><br><small>Python Logic Project</small></div></div>
            <div class="hover-card"><div><strong>Mar 20</strong><br><small>Final Submission</small></div></div>
            <div class="hover-card"><div><strong>Mar 22</strong><br><small>Lab Exam - CS101</small></div></div>
            <div class="hover-card"><div><strong>Mar 28</strong><br><small>UCSC Hackathon Setup</small></div></div>
            <div class="hover-card"><div><strong>Apr 05</strong><br><small>Networking Seminar</small></div></div>
        </aside>

        <main>
            <section id="timer" class="tool-section active">
                <div class="card-container">
                    <h2 style="font-size: 1.8rem;">⌛ Study Timer</h2>
                    <div class="big-display" id="timerDisplay">25:00</div>
                    <div style="display:flex; justify-content:center; gap:12px;">
                        <button class="btn-action btn-maroon" onclick="startTimer()">Start</button>
                        <button class="btn-action btn-red" onclick="pauseTimer()">Pause</button>
                        <button class="btn-action" style="background:#95a5a6" onclick="resetTimer()">Reset</button>
                    </div>
                </div>
            </section>

            <section id="gpa" class="tool-section">
                <div class="card-container">
                    <h2 style="margin-bottom:20px;">🎓 GPA Calculator</h2>
                    <div id="gpaRows">
                        <div style="display:flex; gap:10px; margin-bottom:15px;">
                            <input type="text" placeholder="Subject" style="flex:1;">
                            <input type="number" class="grade-input" placeholder="G" style="width:80px;">
                            <input type="number" class="credit-input" placeholder="C" style="width:80px;">
                        </div>
                    </div>
                    <div style="display:flex; justify-content:center; gap:15px;">
                        <button class="btn-action btn-green" onclick="addGpaRow()">+ Row</button>
                        <button class="btn-action btn-maroon" onclick="calculateGPA()">Calculate</button>
                    </div>
                    <div class="big-display" id="gpaResult" style="font-size:3.5rem;">0.00</div>
                </div>
            </section>

            <section id="board" class="tool-section">
                <div class="card-container">
                    <h2 style="margin-bottom:20px;">💡 Project Idea Board</h2>
                    <div style="display:flex; gap:10px; margin-bottom:15px;">
                        <input type="text" id="boardUser" placeholder="Your Name" style="width:150px;">
                        <input type="text" id="boardIdea" placeholder="Enter idea..." style="flex:1;">
                        <button class="btn-action btn-maroon" onclick="addIdea()">Add Idea</button>
                    </div>
                    <div id="ideaContainer" style="text-align: left;"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- SMART DATA LOGIC ---
        const defaultIdeas = [
            { user: "ADMIN", text: "AI-Powered Resume Parser for Students" },
            { user: "ADMIN", text: "Campus Food Delivery Web App" },
            { user: "ADMIN", text: "Peer-to-Peer Textbook Exchange" },
            { user: "KAVINDU", text: "IoT Based Smart Attendance" },
            { user: "AMANTHA", text: "Student Budget Tracker (LKR)" }
        ];

        let ideas = [];
        
        // This function automatically restores defaults if the board is empty
        function initializeData() {
            const stored = localStorage.getItem('ucsc_ideas');
            const parsed = stored ? JSON.parse(stored) : [];
            
            if (parsed.length === 0) {
                ideas = [...defaultIdeas];
                localStorage.setItem('ucsc_ideas', JSON.stringify(ideas));
            } else {
                ideas = parsed;
            }
            renderIdeas();
        }

        window.onload = () => {
            initializeData();
            if(localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeToggle').checked = true;
            }
        };

        function addIdea() {
            const user = document.getElementById('boardUser').value.trim() || "Anonymous";
            let ideaText = document.getElementById('boardIdea').value.trim();
            if(!ideaText) return;
            if(ideas.some(i => i.text.toLowerCase() === ideaText.toLowerCase())) { alert("Idea already exists!"); return; }

            ideas.unshift({ user: user, text: ideaText });
            localStorage.setItem('ucsc_ideas', JSON.stringify(ideas));
            renderIdeas();
            document.getElementById('boardIdea').value = '';
        }

        function deleteIdea(index) {
            ideas.splice(index, 1);
            localStorage.setItem('ucsc_ideas', JSON.stringify(ideas));
            // If the user deletes everything, restore defaults on next reload/refresh
            renderIdeas();
        }

        function renderIdeas() {
            const container = document.getElementById('ideaContainer');
            container.innerHTML = '';
            ideas.forEach((item, index) => {
                const card = document.createElement('div'); card.className = 'hover-card';
                const contentDiv = document.createElement('div');
                const strong = document.createElement('strong'); strong.textContent = item.text;
                const br = document.createElement('br');
                const small = document.createElement('small');
                small.textContent = `BY ${item.user.toUpperCase()}`;
                small.style.color = "var(--text-muted)"; small.style.fontSize = "0.7rem";
                
                contentDiv.appendChild(strong); contentDiv.appendChild(br); contentDiv.appendChild(small);
                
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-delete';
                delBtn.innerHTML = '<i class="fa-solid fa-trash-can"></i>';
                delBtn.onclick = (e) => { e.stopPropagation(); deleteIdea(index); };
                
                card.appendChild(contentDiv); card.appendChild(delBtn);
                container.appendChild(card);
            });
        }

        function showSection(id, btn) {
            document.querySelectorAll('.tool-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        document.getElementById('darkModeToggle').addEventListener('change', (e) => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', e.target.checked ? 'dark' : 'light');
        });

        let timeLeft = 1500; let timerInt = null;
        function updateTimerUI() { const m = Math.floor(timeLeft/60); const s = timeLeft%60; document.getElementById('timerDisplay').innerText = `${m}:${s<10?'0':''}${s}`; }
        function startTimer() { if(!timerInt) timerInt = setInterval(() => { if(timeLeft <= 0) { clearInterval(timerInt); resetTimer(); } else { timeLeft--; updateTimerUI(); } }, 1000); }
        function pauseTimer() { clearInterval(timerInt); timerInt = null; }
        function resetTimer() { pauseTimer(); timeLeft = 1500; updateTimerUI(); }

        function addGpaRow() {
            const row = document.createElement('div'); row.style = "display:flex; gap:10px; margin-bottom:15px;";
            row.innerHTML = `<input type="text" placeholder="Subject" style="flex:1;"> <input type="number" class="grade-input" placeholder="G" style="width:80px;"> <input type="number" class="credit-input" placeholder="C" style="width:80px;">`;
            document.getElementById('gpaRows').appendChild(row);
        }
        function calculateGPA() {
            const grades = document.querySelectorAll('.grade-input'), credits = document.querySelectorAll('.credit-input');
            let totalPts = 0, totalCr = 0;
            grades.forEach((g, i) => { const gv = parseFloat(g.value), cv = parseFloat(credits[i].value); if(!isNaN(gv) && !isNaN(cv)) { totalPts += (gv * cv); totalCr += cv; } });
            document.getElementById('gpaResult').innerText = totalCr > 0 ? (totalPts/totalCr).toFixed(2) : "0.00";
        }
    </script>
</body>
</html>
